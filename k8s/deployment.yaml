apiVersion: apps/v1
kind: Deployment

metadata:
  name: wine-api-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: wine-api

  template:
    metadata:
      labels:
        app: wine-api

    spec:
      containers:
      - name: wine-api
        image: pushkarmopur/wine-api:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5000
