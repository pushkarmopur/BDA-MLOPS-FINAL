apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: wine-api-argocd
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/pushkarmopur/BDA-MLOPS-FINAL.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
