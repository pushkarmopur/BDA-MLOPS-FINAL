name: Build Image and Push to Docker

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies & Train Model
      run: |
        pip install -r requirements.txt
        python app/train.py

    - name: Login to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: BuildImage
      run: docker build . -t ${{ secrets.DOCKER_HUB_USERNAME }}/wine-api:latest

    - name: PushToHub
      run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/wine-api:latest

    - name: Deploy via Kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        chmod +x ./kind

        ./kind create cluster

        ./kind load docker-image ${{ secrets.DOCKER_HUB_USERNAME }}/wine-api:latest

        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
