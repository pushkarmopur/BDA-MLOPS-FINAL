<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Wine Quality Predictor</title></head>
<body>
    <h2>Wine Quality Analysis Form</h2>
    <form action="/predict" method="post">
        <label>Fixed Acidity:</label> <input type="text" name="fixed acidity" value="7.4"><br>
        <label>Volatile Acidity:</label> <input type="text" name="volatile acidity" value="0.7"><br>
        <label>Citric Acid:</label> <input type="text" name="citric acid" value="0.0"><br>
        <label>Residual Sugar:</label> <input type="text" name="residual sugar" value="1.9"><br>
        <label>Chlorides:</label> <input type="text" name="chlorides" value="0.076"><br>
        <label>Free Sulfur Dioxide:</label> <input type="text" name="free sulfur dioxide" value="11.0"><br>
        <label>Total Sulfur Dioxide:</label> <input type="text" name="total sulfur dioxide" value="34.0"><br>
        <label>Density:</label> <input type="text" name="density" value="0.9978"><br>
        <label>pH:</label> <input type="text" name="pH" value="3.51"><br>
        <label>Sulphates:</label> <input type="text" name="sulphates" value="0.56"><br>
        <label>Alcohol:</label> <input type="text" name="alcohol" value="9.4"><br>
        <button type="submit">Predict Quality</button>
    </form>
</body>
</html>
